name: Build and Release IPK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - go: amd64
            ipk: x86_64
            env: CGO_ENABLED=0 GOOS=linux GOARCH=amd64
          - go: arm64
            ipk: aarch64_generic
            env: CGO_ENABLED=0 GOOS=linux GOARCH=arm64
          - go: mipsle
            ipk: mipsel_24kc
            env: CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install build tools (修复 ipkg-build 下载)
        run: |
          sudo apt update -y
          sudo apt install -y binutils fakeroot file xz-utils curl
          # 关键修复：完整、正确的 curl 命令（一行写完）
          sudo curl -fsSL https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build -o /usr/local/bin/ipkg-build
          sudo chmod +x /usr/local/bin/ipkg-build

      - name: Build Go binary (全平台)
        run: |
          ${{ matrix.env }} go build -ldflags="-s -w" -o HomeNet-Sentinel .
          chmod +x HomeNet-Sentinel
          # 验证二进制架构（可选，便于排查）
          file HomeNet-Sentinel

      - name: Build IPK package
        run: |
          mkdir -p ipk
          sh ./build_ipk.sh --bin ./HomeNet-Sentinel --arch ${{ matrix.ipk }} --output ipk

      - uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.ipk }}
          path: ipk/*.ipk
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'nightly-' }}
          files: dist/*.ipk
          generate_release_notes: true
