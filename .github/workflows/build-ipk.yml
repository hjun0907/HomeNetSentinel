name: Build and Release IPK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - go: mipsle
            ipk: mipsel_24kc
            env: CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有标签和历史

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Get version
        id: get_version
        run: |
          # 从 git tag 获取版本
          VERSION=$(git describe --tags --always --dirty)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Install build tools
        run: |
          sudo apt update -y
          sudo apt install -y binutils fakeroot file xz-utils curl
          sudo curl -fsSL https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build -o /usr/local/bin/ipkg-build
          sudo chmod +x /usr/local/bin/ipkg-build

      - name: Fix Go module dependencies
        run: |
          go mod tidy
          go mod verify

      - name: Build Go binary
        run: |
          ${{ matrix.env }} go build -ldflags="-s -w -X main.Version=${{ steps.get_version.outputs.version }}" -o HomeNet-Sentinel .
          chmod +x HomeNet-Sentinel
          file HomeNet-Sentinel

      - name: Build IPK package
        run: |
          mkdir -p ipk
          OUT_DIR="$(cd ipk && pwd)"
          # 传递版本号给构建脚本
          VERSION="${{ steps.get_version.outputs.version }}" sh ./build_ipk.sh --bin ./HomeNet-Sentinel --arch ${{ matrix.ipk }} --output "$OUT_DIR"

      - uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.ipk }}
          path: ipk/*.ipk
          if-no-files-found: error
