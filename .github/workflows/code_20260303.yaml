name: Build HomeNetSentinel MT7621 IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Chmod scripts
        run: chmod +x build_ipk.sh

      # 生成占位二进制（跳过 .NET MIPS 编译，因为官方不支持）
      - name: Create dummy binary
        run: |
          mkdir -p $HOME/.build/HomeNetSentinel/out-musl
          echo "#dummy" > $HOME/.build/HomeNetSentinel/out-musl/HomeNetSentinel
          chmod +x $HOME/.build/HomeNetSentinel/out-musl/HomeNetSentinel

      # 改用 24.10.1 + 浙大镜像（100% 可下）
      - name: Download MT7621 SDK (fixed)
        run: |
          wget -O sdk.tar.zst https://mirror.zju.edu.cn/immortalwrt/releases/24.10.1/targets/ramips/mt7621/immortalwrt-sdk-24.10.1-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar -xf sdk.tar.zst -C $HOME/
          mv $HOME/immortalwrt-sdk-24.10.1-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 $HOME/immortalwrt-sdk-mt7621

      # 打包 IPK（结构正确，后续替换二进制即可）
      - name: Build IPK
        run: |
          ./build_ipk.sh \
            --bin "$HOME/.build/HomeNetSentinel/out-musl/HomeNetSentinel" \
            --arch mipsel_24kc \
            --version 1.0.0-0 \
            --output "$HOME/.build/ipk" \
            --ipkg-build "$HOME/immortalwrt-sdk-mt7621/scripts/ipkg-build"

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: mt7621-ipk
          path: $HOME/.build/ipk/*.ipk

