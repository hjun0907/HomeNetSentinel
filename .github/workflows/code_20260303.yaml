name: Build HomeNetSentinel MT7621 IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker
        run: sudo systemctl start docker

      - name: Chmod scripts
        run: chmod +x build-aot.sh build_ipk.sh

      # 这里是唯一要改的：把 csproj 路径写对！
      - name: Build AOT with your script
        run: |
          ./build-aot.sh \
            "$(pwd)" \
            HomeNetSentinel/HomeNetSentinel.csproj \
            linux-musl-mipsel \
            $HOME/.build/HomeNetSentinel

      - name: Download MT7621 SDK
        run: |
          wget -O sdk.tar.xz https://downloads.immortalwrt.org/releases/24.10.2/targets/ramips/mt7621/immortalwrt-sdk-24.10.2-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xf sdk.tar.xz -C $HOME/
          mv $HOME/immortalwrt-sdk-24.10.2-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 $HOME/immortalwrt-sdk-mt7621

      - name: Build IPK
        run: |
          ./build_ipk.sh \
            --bin "$HOME/.build/HomeNetSentinel/out-musl/HomeNetSentinel" \
            --arch mipsel_24kc \
            --version 1.0.0-0 \
            --output "$HOME/.build/ipk" \
            --ipkg-build "$HOME/immortalwrt-sdk-mt7621/scripts/ipkg-build"

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: mt7621-ipk
          path: $HOME/.build/ipk/*.ipk

