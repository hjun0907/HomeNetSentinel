name: Build and Release IPK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (without release suffix), e.g. 1.2.3"
        required: false
        default: "0.0.0"
      tag_name:
        description: "Release tag for manual runs, e.g. v1.2.3"
        required: false
        default: ""
      publish_release:
        description: "Publish artifacts to GitHub Releases"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  PROJECT_DIR: HomeNetSentinel
  PROJECT_FILE: HomeNetSentinel.csproj

jobs:
  build-ipk:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-musl-x64
            ipk_arch: x86_64
            runner: ubuntu-latest
            aot: true
          - rid: linux-musl-arm64
            ipk_arch: aarch64_generic
            runner: ubuntu-24.04-arm
            aot: true
          - rid: linux-musl-mips
            ipk_arch: mipsel_24kc
            runner: ubuntu-latest
            aot: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils fakeroot file xz-utils curl
          if ! command -v ipkg-build >/dev/null 2>&1; then
            sudo curl -fsSL https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build -o /usr/local/bin/ipkg-build
            sudo chmod +x /usr/local/bin/ipkg-build
          fi

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="${{ github.event.inputs.version }}"
          fi
          echo "value=${ver:-0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Publish binary
        shell: bash
        run: |
          set -euo pipefail
          out_dir="${{ runner.temp }}/publish/${{ matrix.rid }}"
          mkdir -p "$out_dir"

          dotnet publish "$PROJECT_DIR/$PROJECT_FILE" \
            -c Release \
            -r "${{ matrix.rid }}" \
            -p:PublishAot=${{ matrix.aot }} \
            -p:SelfContained=true \
            -p:TrimMode=Full \
            -p:InvariantGlobalization=true \
            -o "$out_dir"

      - name: Prepare binary
        id: bin
        shell: bash
        run: |
          set -euo pipefail
          src="${{ runner.temp }}/publish/${{ matrix.rid }}/HomeNetSentinel"
          dest="${{ runner.temp }}/staging/${{ matrix.ipk_arch }}/HomeNet-Sentinel"
          mkdir -p "$(dirname "$dest")"
          cp "$src" "$dest"
          chmod +x "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      - name: Build IPK
        run: |
          sh ./build_ipk.sh \
            --bin "${{ steps.bin.outputs.path }}" \
            --arch "${{ matrix.ipk_arch }}" \
            --version "${{ steps.version.outputs.value }}-1" \
            --output "${{ runner.temp }}/ipk/${{ matrix.ipk_arch }}"

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.ipk_arch }}
          path: ${{ runner.temp }}/ipk/${{ matrix.ipk_arch }}/*.ipk

  release:
    runs-on: ubuntu-latest
    needs: build-ipk
    if: github.ref_type == 'tag' || github.event.inputs.publish_release == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create Release
        uses: softprops/gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag_name || 'nightly-' }}
          files: dist/*.ipk
          generate_release_notes: true
