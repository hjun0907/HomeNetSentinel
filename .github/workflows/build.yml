      - name: Download MT7621 SDK
        run: |
          curl -L -o sdk.tar.zst \
            https://downloads.immortalwrt.org/releases/24.10.1/targets/ramips/mt7621/immortalwrt-sdk-24.10.1-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst \
            --retry 20 --retry-delay 10 --retry-all-errors \
            --connect-timeout 10 --max-time 300 -k
          
          tar -xf sdk.tar.zst -C $HOME/

          mv $HOME/immortalwrt-sdk-24.10.1-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64 \
             $HOME/immortalwrt-sdk-mt7621
